<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SANDRO RADIO TV">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e50914">
<title>SANDRO RADIO TV smart edition</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root {
    --primary: #e50914;
    --primary-dark: #b2070f;
    --primary-glow: rgba(229, 9, 20, 0.3);
    --bg-dark: #000000;
    --glass-bg: rgba(40, 40, 40, 0.3);
    --glass-bg-heavy: rgba(20, 20, 20, 0.88);
    --glass-bg-light: rgba(30, 30, 30, 0.65);
    --glass-border: rgba(255, 255, 255, 0.07);
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --ios-blue: #007AFF;
    --ios-green: #34C759;
    --ios-red: #FF3B30;
    --ios-orange: #FF9500;
    --ios-purple: #AF52DE;
    --ios-pink: #FF2D55;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-font-smoothing: antialiased;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
        radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 122, 255, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.app-header {
    height: 60px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    flex-shrink: 0;
    z-index: 100;
}

.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--primary-glow); flex-shrink: 0;
}
.brand-logo svg { width: 20px; height: 20px; color: white; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-title {
    font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.5px;
}
.brand-subtitle {
    font-size: 9px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
}

.header-status {
    display: flex; align-items: center; gap: 5px;
    background: rgba(52, 199, 89, 0.1);
    border: 1px solid rgba(52, 199, 89, 0.12);
    padding: 4px 10px; border-radius: 14px;
    font-size: 10px; font-weight: 700; color: var(--ios-green);
}
.status-dot {
    width: 6px; height: 6px; background: var(--ios-green);
    border-radius: 50%; animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* ===== DROPDOWN MENU ===== */
.channel-dropdown { position: absolute; top: 12px; left: 12px; z-index: 50; }
.dropdown-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 14px;
    color: var(--text-primary); font-size: 16px; font-weight: 700;
    cursor: pointer; transition: var(--transition);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.dropdown-toggle:active { transform: scale(0.96); }
.dropdown-toggle svg { width: 20px; height: 20px; transition: transform 0.3s; }
.dropdown-toggle.open svg:last-child { transform: rotate(180deg); }
.dropdown-badge {
    background: var(--primary); color: white;
    padding: 3px 10px; border-radius: 8px;
    font-size: 13px; font-weight: 700; min-width: 24px; text-align: center;
}

.dropdown-menu {
    position: absolute; top: calc(100% + 10px); left: 0;
    width: 420px; max-width: 94vw; height: 78vh; max-height: 720px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 18px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
    display: none; flex-direction: column; overflow: hidden;
    animation: dropdownSlide 0.3s ease;
}
.dropdown-menu.open { display: flex; }
@keyframes dropdownSlide {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.dropdown-tabs {
    display: flex; padding: 10px 14px; gap: 8px;
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0; background: rgba(0,0,0,0.2);
}
.tab-btn {
    flex: 1; padding: 12px 8px; border-radius: 10px;
    border: none; background: transparent;
    color: var(--text-secondary); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: var(--transition);
}
.tab-btn:active { transform: scale(0.95); }
.tab-btn.active {
    background: var(--glass-bg); color: var(--text-primary);
    border: 1px solid var(--glass-border);
}
.tab-content { display: none; flex: 1; flex-direction: column; min-height: 0; }
.tab-content.active { display: flex; }

.dropdown-search {
    padding: 12px 14px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
}
.search-input-wrapper { position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 14px; width: 20px; height: 20px; color: var(--text-secondary); }
.search-input {
    width: 100%; background: var(--glass-bg);
    border: 1px solid var(--glass-border); border-radius: 12px;
    padding: 12px 14px 12px 44px;
    color: var(--text-primary); font-size: 15px; outline: none;
    transition: var(--transition);
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.search-input::placeholder { font-size: 14px; color: var(--text-secondary); }

.dropdown-filters {
    padding: 10px 14px; display: flex; gap: 8px;
    overflow-x: auto; border-bottom: 1px solid var(--glass-border);
    scrollbar-width: none; flex-shrink: 0;
}
.dropdown-filters::-webkit-scrollbar { display: none; }
.filter-chip {
    padding: 8px 16px; border-radius: 16px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-secondary); font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: var(--transition);
}
.filter-chip:active { transform: scale(0.95); }
.filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

.dropdown-list {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 6px 0; -webkit-overflow-scrolling: touch; min-height: 0;
}
.dropdown-list::-webkit-scrollbar { width: 4px; }
.dropdown-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

.channel-group-header {
    padding: 10px 16px; font-size: 12px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
    background: rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 10;
}

.channel-option {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    transition: var(--transition); border-left: 4px solid transparent;
}
.channel-option:active { transform: scale(0.98); }
.channel-option.active {
    background: linear-gradient(90deg, rgba(229,9,20,0.15), transparent);
    border-left-color: var(--primary);
}
.channel-option-logo {
    width: 42px; height: 42px; border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden; flex-shrink: 0;
}
.channel-option-logo img { width: 100%; height: 100%; object-fit: cover; }
.channel-option-info { flex: 1; overflow: hidden; }
.channel-option-name {
    font-size: 16px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.channel-option-group {
    font-size: 11px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px;
}

/* ===== PLAYER ===== */
.player-wrapper {
    flex: 1; position: relative; background: #000;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
}
#videoPlayer { width: 100%; height: 100%; object-fit: contain; background: #000; }
#videoPlayer.mode-normal { object-fit: contain; }
#videoPlayer.mode-16-9 { object-fit: cover; }
#videoPlayer.mode-fill { object-fit: fill; }
#videoPlayer.mode-original { object-fit: none; }

.player-placeholder {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-secondary);
}
.placeholder-icon { font-size: 50px; margin-bottom: 10px; opacity: 0.5; }
.placeholder-text { font-size: 14px; font-weight: 600; }

.play-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5;
}
.play-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.play-overlay-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(229,9,20,0.5);
}
.play-overlay-btn svg { width: 32px; height: 32px; color: white; margin-left: 4px; }
.play-overlay-text { margin-top: 10px; color: white; font-size: 14px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

.buffering-indicator {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); z-index: 6; display: none;
}
.buffering-indicator.active { display: block; }
.spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.rec-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,59,48,0.9); backdrop-filter: blur(10px);
    padding: 5px 12px; border-radius: 14px;
    display: none; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; z-index: 10;
}
.rec-badge.active { display: flex; animation: slideIn 0.3s ease; }
.rec-dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1s infinite; }

.video-flash {
    position: absolute; inset: 0; background: white;
    opacity: 0; pointer-events: none; z-index: 10;
}
.video-flash.flash { animation: flashEffect 0.2s; }
@keyframes flashEffect { 0%{opacity:0} 10%{opacity:0.6} 100%{opacity:0} }

/* ===== POPUP PLAYLIST ===== */
.playlist-popup {
    position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    width: 380px; max-width: 94vw; max-height: 70vh;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: 16px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
    display: none; flex-direction: column; overflow: hidden;
    z-index: 60; margin-bottom: 8px;
    animation: popupSlide 0.3s ease;
}
.playlist-popup.open { display: flex; }
@keyframes popupSlide {
    from { opacity: 0; transform: translateX(-50%) translateY(0); }
    to { opacity: 1; transform: translateX(-50%) translateY(-10px); }
}

.playlist-popup-header {
    padding: 12px 14px; border-bottom: 1px solid var(--glass-border);
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.2);
}
.playlist-popup-header h3 { font-size: 15px; font-weight: 700; color: var(--primary); }
.playlist-popup-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.playlist-popup-close:active { transform: scale(0.9); background: var(--primary); }
.playlist-popup-list { flex: 1; overflow-y: auto; padding: 6px 0; max-height: 280px; }

.playlist-popup-actions {
    padding: 10px; border-top: 1px solid var(--glass-border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: rgba(0,0,0,0.3);
}
.playlist-action-btn {
    padding: 10px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ffffff; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: all 0.2s ease; min-height: 44px;
}
.playlist-action-btn:active { transform: scale(0.95); }
.playlist-action-btn svg { width: 18px; height: 18px; }
.playlist-action-btn.primary {
    background: linear-gradient(135deg, #e50914, #b2070f);
    border-color: #e50914; color: white;
}

/* ===== EPG POPUP ===== */
.epg-panel {
    position: absolute; top: 70px; right: 12px;
    width: 360px; max-width: 90vw; max-height: 70vh;
    background: var(--glass-bg-light);
    backdrop-filter: blur(25px) saturate(160%);
    -webkit-backdrop-filter: blur(25px) saturate(160%);
    border: 1px solid var(--glass-border); border-radius: 16px;
    display: none; flex-direction: column; z-index: 45;
    padding: 14px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    animation: dropdownSlide 0.3s ease;
}
.epg-panel.open { display: flex; }
.epg-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--glass-border);
}
.epg-header h3 { font-size: 16px; font-weight: 700; color: var(--primary); }
.epg-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-size: 16px; cursor: pointer;
}
.epg-close:active { transform: scale(0.9); background: var(--primary); }
.epg-list { flex: 1; overflow-y: auto; }
.epg-item {
    padding: 10px 12px; border-bottom: 1px solid var(--glass-border);
    border-radius: 8px; margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
}
.epg-item .time { font-size: 12px; color: var(--primary); font-weight: 700; }
.epg-item .title { font-size: 15px; font-weight: 700; margin-top: 2px; }
.epg-item .desc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

/* ===== CONTROL BAR ===== */
.control-bar {
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-top: 1px solid var(--glass-border);
    padding: 8px 10px 6px 10px;
    display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0; position: relative;
}
.control-row {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; justify-content: center;
}
.main-controls {
    justify-content: center; gap: 12px;
    padding: 4px 0; border-bottom: 1px solid var(--glass-border);
    margin-bottom: 4px;
}
.secondary-controls { justify-content: center; flex-wrap: wrap; gap: 6px; }

.url-wrapper {
    display: flex; gap: 4px; align-items: center;
    background: var(--glass-bg); backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); border-radius: 10px;
    padding: 3px 6px; min-height: 40px;
}
.url-wrapper input[type="text"] {
    flex: 1; background: transparent; border: none;
    padding: 3px 5px; color: var(--text-primary);
    font-size: 12px; outline: none; min-width: 70px; max-width: 140px;
}
.url-wrapper input[type="text"]::placeholder { color: var(--text-secondary); font-size: 11px; }
.url-wrapper .ios-btn {
    padding: 3px 8px; min-height: 30px; font-size: 11px; border-radius: 6px;
}
.url-wrapper .ios-btn svg { width: 14px; height: 14px; }

.ios-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 5px; padding: 8px 12px;
    background: var(--glass-bg); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border); border-radius: 10px;
    color: var(--text-primary); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: var(--transition);
    white-space: nowrap; min-height: 44px;
}
.ios-btn:active { transform: scale(0.93); }
.ios-btn svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }

.ios-btn.play-pause {
    width: 64px; height: 64px; border-radius: 50%; padding: 0;
    background: linear-gradient(135deg, var(--ios-green), #28a745);
    border: none; box-shadow: 0 4px 25px rgba(52,199,89,0.35);
}
.ios-btn.play-pause svg { width: 32px; height: 32px; }
.ios-btn.play-pause:active { transform: scale(0.92); }

.ios-btn.nav { width: 52px; height: 52px; border-radius: 50%; padding: 0; }
.ios-btn.nav svg { width: 26px; height: 26px; }

.ios-btn.compact {
    padding: 8px 12px; font-size: 13px; border-radius: 10px; min-height: 44px;
}
.ios-btn.compact svg { width: 20px; height: 20px; }

.ios-btn.primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-color: rgba(229,9,20,0.5); color: white;
}
.ios-btn.record { background: rgba(255,59,48,0.12); border-color: rgba(255,59,48,0.25); color: var(--ios-red); }
.ios-btn.record.recording {
    background: var(--ios-red); color: white;
    animation: pulseRec 1.5s infinite;
}
@keyframes pulseRec {
    0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0.4)}
    50%{box-shadow:0 0 0 10px rgba(255,59,48,0)}
}
.ios-btn.screenshot { background: rgba(0,122,255,0.12); border-color: rgba(0,122,255,0.25); color: var(--ios-blue); }
.ios-btn.pip { background: rgba(175,82,222,0.12); border-color: rgba(175,82,222,0.25); color: var(--ios-purple); }
.ios-btn.audio { background: rgba(52,199,89,0.12); border-color: rgba(52,199,89,0.25); color: var(--ios-green); }
.ios-btn.audio.muted { background: rgba(255,59,48,0.12); border-color: rgba(255,59,48,0.25); color: var(--ios-red); }
.ios-btn.aspect { background: rgba(0,200,200,0.12); border-color: rgba(0,200,200,0.25); color: #00c8c8; }
.ios-btn.file-btn { background: rgba(255,149,0,0.12); border-color: rgba(255,149,0,0.25); color: var(--ios-orange); }
.ios-btn.epg-btn { background: rgba(0,200,200,0.12); border-color: rgba(0,200,200,0.25); color: #00c8c8; }
.ios-btn.speed-btn { background: rgba(175,82,222,0.12); border-color: rgba(175,82,222,0.25); color: var(--ios-purple); }
.ios-btn.night-btn { background: rgba(0,122,255,0.12); border-color: rgba(0,122,255,0.25); color: var(--ios-blue); }
.ios-btn.playlist-btn { background: rgba(255,45,85,0.12); border-color: rgba(255,45,85,0.25); color: var(--ios-pink); }

.hidden { display: none !important; }

.recordings-panel {
    position: absolute; bottom: 0; left: 0; right: 0; height: 180px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-top: 1px solid var(--glass-border);
    display: none; flex-direction: column; z-index: 40;
    animation: slideUp 0.3s ease;
}
.recordings-panel.open { display: flex; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.recordings-header {
    padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--glass-border); font-size: 13px; font-weight: 700;
}
.recordings-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.rec-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.rec-info { flex: 1; overflow: hidden; }
.rec-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-meta { font-size: 10px; color: var(--text-secondary); display: flex; gap: 8px; }
.rec-actions { display: flex; gap: 4px; }
.rec-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-primary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.rec-btn:active { transform: scale(0.9); }
.rec-btn.primary { background: var(--ios-blue); border-color: var(--ios-blue); }
.rec-btn.danger { background: rgba(255,59,48,0.2); border-color: var(--ios-red); color: var(--ios-red); }

.toast {
    position: fixed; top: calc(var(--safe-top) + 65px); left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid var(--glass-border);
    padding: 10px 20px; border-radius: 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 1000; opacity: 0;
    transition: all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
    border-left: 4px solid var(--primary); max-width: 90%;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-icon { font-size: 18px; }

.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    display: none; align-items: flex-end; justify-content: center; z-index: 500;
}
.modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
.modal-content {
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(30px) saturate(180%);
    width: 100%; max-width: 500px;
    border-radius: 16px 16px 0 0;
    padding: 18px; padding-bottom: calc(18px + var(--safe-bottom));
    animation: slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    border-top: 1px solid var(--glass-border);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.modal-close:active { transform: scale(0.9); background: var(--primary); }
.modal-input {
    width: 100%; background: var(--glass-bg);
    border: 1px solid var(--glass-border); border-radius: 8px;
    padding: 12px 14px; color: var(--text-primary);
    font-size: 15px; outline: none; margin-bottom: 10px;
}
.modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.modal-btn {
    width: 100%; padding: 12px; border-radius: 10px;
    border: none; font-size: 15px; font-weight: 700; cursor: pointer;
}
.modal-btn.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }

input[type="file"] {
    position: absolute; width: 1px; height: 1px; padding: 0;
    margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0);
    white-space: nowrap; border: 0; opacity: 0;
}

/* ===== ⭐ LANDSCAPE MODE - VIDEO A SCHERMO PIENO ===== */
body.landscape-mode {
    background: #000;
}
body.landscape-mode .app-header,
body.landscape-mode .control-bar,
body.landscape-mode .channel-dropdown,
body.landscape-mode .epg-panel,
body.landscape-mode .playlist-popup,
body.landscape-mode .recordings-panel,
body.landscape-mode .rec-badge {
    display: none !important;
}
body.landscape-mode .main-content {
    height: 100vh !important;
    height: 100dvh !important;
}
body.landscape-mode .player-wrapper {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    height: 100dvh !important;
    z-index: 9999 !important;
    background: #000 !important;
}
body.landscape-mode #videoPlayer {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
}
body.landscape-mode .play-overlay {
    z-index: 10000 !important;
}
body.landscape-mode .buffering-indicator {
    z-index: 10001 !important;
}

/* Pulsante per uscire dal landscape mode */
.landscape-exit-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10002;
    transition: var(--transition);
}
.landscape-exit-btn:active { transform: scale(0.9); background: var(--primary); }
body.landscape-mode .landscape-exit-btn { display: flex; }

.screenshot-preview {
    position: fixed; bottom: 15px; left: 15px;
    width: 140px; height: 78px; border-radius: 8px;
    border: 2px solid var(--primary);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    z-index: 1000; animation: slideInLeft 0.2s ease;
    cursor: pointer; object-fit: cover;
}
.screenshot-preview:hover { transform: scale(1.2); box-shadow: 0 15px 30px rgba(0,0,0,0.8); z-index: 1001; }
@keyframes slideInLeft { from { opacity:0; transform:translateX(-100%); } to { opacity:1; transform:translateX(0); } }

@media (max-width: 480px) {
    .brand-title { font-size: 15px; }
    .brand-subtitle { font-size: 8px; letter-spacing: 1.5px; }
    .brand-logo { width: 32px; height: 32px; }
    .brand-logo svg { width: 17px; height: 17px; }
    .app-header { height: 54px; padding: 0 10px; }
    .header-status { padding: 3px 8px; font-size: 9px; }
    
    .control-bar { padding: 6px 6px 4px 6px; }
    .ios-btn.play-pause { width: 58px; height: 58px; }
    .ios-btn.play-pause svg { width: 30px; height: 30px; }
    .ios-btn.nav { width: 48px; height: 48px; }
    .ios-btn.nav svg { width: 24px; height: 24px; }
    .ios-btn { padding: 8px 10px; font-size: 12px; min-height: 44px; }
    .ios-btn.compact { padding: 8px 10px; font-size: 12px; min-height: 44px; }
    .ios-btn.compact svg { width: 20px; height: 20px; }
    
    .url-wrapper { min-height: 36px; }
    .url-wrapper input[type="text"] { font-size: 11px; min-width: 50px; max-width: 100px; padding: 2px 4px; }
    .url-wrapper input[type="text"]::placeholder { font-size: 10px; }
    .url-wrapper .ios-btn { padding: 3px 6px; min-height: 28px; font-size: 10px; }
    .url-wrapper .ios-btn svg { width: 13px; height: 13px; }
    
    .dropdown-menu { width: 96vw; max-height: 78vh; }
    .dropdown-toggle { padding: 10px 14px; font-size: 14px; }
    .dropdown-toggle svg { width: 18px; height: 18px; }
    .channel-option { padding: 10px 12px; }
    .channel-option-name { font-size: 15px; }
    .channel-option-logo { width: 38px; height: 38px; font-size: 20px; }
    .tab-btn { font-size: 14px; padding: 10px 6px; }
    .search-input { font-size: 14px; padding: 10px 12px 10px 40px; }
    .filter-chip { font-size: 12px; padding: 6px 12px; }
    
    .playlist-popup { width: 94vw; }
    .epg-panel { width: 94vw; top: 60px; right: 3vw; }
    
    .screenshot-preview { width: 90px; height: 50px; }
}

@media (prefers-reduced-motion: reduce) {
    *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; }
}

<body>

<!-- HEADER -->
<header class="app-header">
    <div class="header-brand">

        </div>
        <div class="brand-text">
            <div class="brand-title">SANDRO RADIO TV</div>
            <div class="brand-subtitle">smart edition</div>
        </div>

<!-- MAIN CONTENT -->
<main class="main-content">
    
    <!-- PLAYER -->

                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5V19L19 12L8 5Z"/></svg>
            </div>
            <div class="play-overlay-text">Clicca per avviare</div>
        </div>
        
        <div class="rec-badge" id="recBadge">
            <span class="rec-dot"></span>
            <span>REC</span>
            <span id="recTime">00:00</span>
        </div>
        
        <div class="video-flash" id="videoFlash"></div>
        
        <!-- ⭐ PULSANTE PER USCIRE DAL LANDSCAPE -->
        <button class="landscape-exit-btn" id="landscapeExitBtn" onclick="exitLandscapeMode()" title="Torna verticale">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        
        <!-- DROPDOWN MENU -->
        <div class="channel-dropdown">
            <button class="dropdown-toggle" id="dropdownToggle">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                <span>Menu</span>
                <span class="dropdown-badge" id="channelCount">0</span>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
            
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-tabs">
                    <button class="tab-btn active" data-tab="tv">📺 TV</button>
                    <button class="tab-btn" data-tab="radio">🎵 Radio</button>
                </div>
                
                <div class="tab-content active" id="tab-tv">
                    <div class="dropdown-search">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>

                        <button class="filter-chip" data-filter="Satellite">Satellite</button>

                </div>
                
                <div class="tab-content" id="tab-radio">
                    <div class="dropdown-search">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                            <input type="text" class="search-input" id="radioSearchInput" placeholder="Cerca radio...">

                </div>
            </div>
        </div>
        
        <!-- EPG POPUP -->
        <div class="epg-panel" id="epgPanel">

        </div>
        
    </div>
    
    <!-- CONTROL BAR -->
    <div class="control-bar">
        <div class="control-row main-controls">

function loadFromStorage() {
    try {
        const rec = localStorage.getItem('sandro_recordings');
        const playlists = localStorage.getItem('sandro_playlists');
        if (rec) App.recordings = JSON.parse(rec);
        if (playlists) App.savedPlaylists = JSON.parse(playlists);
    } catch (e) { console.error('Errore storage:', e); }
}

function saveToStorage() {
    try {
        localStorage.setItem('sandro_recordings', JSON.stringify(App.recordings));
        localStorage.setItem('sandro_playlists', JSON.stringify(App.savedPlaylists));
    } catch (e) { console.error('Errore salvataggio:', e); }
}

function toggleDropdown() {
    document.getElementById('dropdownToggle').classList.toggle('open');
    document.getElementById('dropdownMenu').classList.toggle('open');
}
function closeDropdown() {
    document.getElementById('dropdownToggle').classList.remove('open');
    document.getElementById('dropdownMenu').classList.remove('open');
}

function togglePlaylistPopup() {
    const popup = document.getElementById('playlistPopup');
    popup.classList.toggle('open');
    App.playlistPopupOpen = popup.classList.contains('open');
    if (App.playlistPopupOpen) renderPlaylists();
}
function closePlaylistPopup() {
    document.getElementById('playlistPopup').classList.remove('open');
    App.playlistPopupOpen = false;
}

document.addEventListener('click', function(e) {
    if (e.target.closest('.tab-btn')) {
        const btn = e.target.closest('.tab-btn');
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        App.currentMode = tab;
        if (tab === 'radio') renderRadios();
    }
});

function renderChannels() {
    const container = document.getElementById('channelList');
    const channels = App.filteredChannels;
    if (channels.length === 0) {
        container.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-secondary);font-size:13px;">Nessun canale trovato</div>';
        return;
    }
    const fragment = document.createDocumentFragment();
    const grouped = channels.reduce((acc, ch) => {
        const group = ch.group || 'Altro';
        if (!acc[group]) acc[group] = [];
        acc[group].push(ch);
        return acc;
    }, {});
    Object.keys(grouped).sort().forEach(group => {
        const header = document.createElement('div');
        header.className = 'channel-group-header';
        header.textContent = `${group} (${grouped[group].length})`;
        fragment.appendChild(header);
        grouped[group].forEach(ch => {
            const item = document.createElement('div');
            item.className = 'channel-option';
            const isActive = App.currentChannel && App.currentChannel.url === ch.url;
            if (isActive) item.classList.add('active');
            item.innerHTML = `
                <div class="channel-option-logo">${ch.logo ? `<img src="${ch.logo}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='📺'">` : '📺'}</div>
                <div class="channel-option-info">
                    <div class="channel-option-name">${escapeHtml(ch.name)}</div>
                    <div class="channel-option-group">${escapeHtml(ch.group || '')}</div>
                </div>
            `;
            item.addEventListener('click', () => { playChannel(ch, App.channels.indexOf(ch)); closeDropdown(); });
            fragment.appendChild(item);
        });
    });
    container.innerHTML = '';
    container.appendChild(fragment);
}

function filterChannels() {
    let filtered = [...App.channels];
    if (App.currentFilter !== 'all') filtered = filtered.filter(ch => ch.group === App.currentFilter);
    if (App.searchQuery) {
        const q = App.searchQuery.toLowerCase();
        filtered = filtered.filter(ch => ch.name.toLowerCase().includes(q) || (ch.group && ch.group.toLowerCase().includes(q)));
    }
    App.filteredChannels = filtered;
    renderChannels();
}

function renderRadios() {
    const container = document.getElementById('radioList');
    const search = document.getElementById('radioSearchInput');
    const query = search ? search.value.toLowerCase() : '';
    let radios = App.radioChannels;
    if (query) radios = radios.filter(r => r.name.toLowerCase().includes(query) || (r.group && r.group.toLowerCase().includes(query)));
    if (radios.length === 0) {
        container.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-secondary);font-size:13px;">Nessuna radio trovata</div>';
        return;
    }
    const grouped = radios.reduce((acc, r) => {
        const group = r.group || 'Altre';
        if (!acc[group]) acc[group] = [];
        acc[group].push(r);
        return acc;
    }, {});
    let html = '';
    Object.keys(grouped).sort().forEach(group => {
        html += `<div class="channel-group-header">${group} (${grouped[group].length})</div>`;
        grouped[group].forEach(r => {
            const isActive = App.currentRadio && App.currentRadio.url === r.url;
            html += `
                <div class="channel-option ${isActive ? 'active' : ''}" onclick="playRadio('${escapeHtml(r.url)}', '${escapeHtml(r.name)}')">
                    <div class="channel-option-logo">${r.logo || '🎵'}</div>
                    <div class="channel-option-info">
                        <div class="channel-option-name">${escapeHtml(r.name)}</div>
                        <div class="channel-option-group">${escapeHtml(r.group || '')}</div>
                    </div>
                </div>
            `;
        });
    });
    container.innerHTML = html;
}

function playRadio(url, name) {
    if (!url) { showToast('❌ URL radio non valido', true); return; }
    const video = document.getElementById('videoPlayer');
    const placeholder = document.getElementById('playerPlaceholder');
    if (placeholder) placeholder.style.display = 'none';
    if (App.hls) { App.hls.destroy(); App.hls = null; }
    App.currentRadio = { name, url };
    App.isPlaying = true;
    App.currentChannel = null;
    if (url.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
        App.hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        App.hls.loadSource(url);
        App.hls.attachMedia(video);
        App.hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().then(() => { hidePlayOverlay(); updatePlayButton(); showToast(`🎵 ${name}`); })
                .catch(e => showToast('❌ Errore riproduzione', true));
        });
    } else {
        video.src = url;
        video.play().then(() => { hidePlayOverlay(); updatePlayButton(); showToast(`🎵 ${name}`); })
            .catch(e => showToast('❌ Errore riproduzione', true));
    }
    renderRadios();
}

function playChannel(channel, index) {
    if (!channel || !channel.url) { showToast('❌ Canale non valido', true); return; }
    App.currentChannel = channel;
    App.currentChannelIndex = index;
    App.currentRadio = null;
    const video = document.getElementById('videoPlayer');
    const placeholder = document.getElementById('playerPlaceholder');
    if (placeholder) placeholder.style.display = 'none';
    if (App.hls) { App.hls.destroy(); App.hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    showPlayOverlay();
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        App.hls = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 90, maxBufferLength: 60 });
        App.hls.loadSource(channel.url);
        App.hls.attachMedia(video);
        App.hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().then(() => { hidePlayOverlay(); App.isPlaying = true; updatePlayButton(); showToast(`▶ ${channel.name}`); })
                .catch(error => { showToast('▶ Clicca il video per avviare', 'warning'); });
        });
        App.hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { showToast('❌ Errore rete. Riprovo...', true); App.hls.startLoad(); }
                else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { showToast('❌ Errore media. Riprovo...', true); App.hls.recoverMediaError(); }
                else { showToast('❌ Stream non disponibile', true); App.hls.destroy(); }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channel.url;
        video.addEventListener('loadedmetadata', function() {
            video.play().then(() => { hidePlayOverlay(); App.isPlaying = true; updatePlayButton(); })
                .catch(error => {});
        });
    } else {
        showToast('❌ Formato non supportato', true);
    }
    renderChannels();
}

function showPlayOverlay() { document.getElementById('playOverlay').classList.add('active'); }
function hidePlayOverlay() { document.getElementById('playOverlay').classList.remove('active'); }

function togglePlayPause() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls && !App.currentRadio) {
        showToast('❌ Seleziona un canale o radio', true);
        return;
    }
    if (video.paused) { video.play().catch(e => showToast('❌ Impossibile avviare', true)); }
    else { video.pause(); }
}

function previousChannel() {
    if (App.currentMode === 'radio') {
        const idx = App.radioChannels.findIndex(r => r.url === (App.currentRadio ? App.currentRadio.url : ''));
        if (idx > 0) playRadio(App.radioChannels[idx-1].url, App.radioChannels[idx-1].name);
        else if (App.radioChannels.length > 0) playRadio(App.radioChannels[App.radioChannels.length-1].url, App.radioChannels[App.radioChannels.length-1].name);
        return;
    }
    if (App.channels.length === 0) { showToast('❌ Nessun canale caricato', true); return; }
    let newIndex = App.currentChannelIndex - 1;
    if (newIndex < 0) newIndex = App.channels.length - 1;
    playChannel(App.channels[newIndex], newIndex);
}

function nextChannel() {
    if (App.currentMode === 'radio') {
        const idx = App.radioChannels.findIndex(r => r.url === (App.currentRadio ? App.currentRadio.url : ''));
        if (idx < App.radioChannels.length - 1) playRadio(App.radioChannels[idx+1].url, App.radioChannels[idx+1].name);
        else if (App.radioChannels.length > 0) playRadio(App.radioChannels[0].url, App.radioChannels[0].name);
        return;
    }
    if (App.channels.length === 0) { showToast('❌ Nessun canale caricato', true); return; }
    let newIndex = App.currentChannelIndex + 1;
    if (newIndex >= App.channels.length) newIndex = 0;
    playChannel(App.channels[newIndex], newIndex);
}

function updatePlayButton() {
    const btn = document.getElementById('btnPlayPause');
    if (!btn) return;
    const video = document.getElementById('videoPlayer');
    const iconPlay = btn.querySelector('.icon-play');
    const iconPause = btn.querySelector('.icon-pause');
    if (video.paused) { iconPlay && iconPlay.classList.remove('hidden'); iconPause && iconPause.classList.add('hidden'); }
    else { iconPlay && iconPlay.classList.add('hidden'); iconPause && iconPause.classList.remove('hidden'); }
}

function cycleAspectMode() {
    const modes = ['normal', '16-9', 'fill', 'original'];
    const labels = ['Normale', '16:9', 'Fill', 'Original'];
    const currentIndex = modes.indexOf(App.aspectMode);
    const nextIndex = (currentIndex + 1) % modes.length;
    App.aspectMode = modes[nextIndex];
    document.getElementById('videoPlayer').className = `mode-${App.aspectMode}`;
    document.getElementById('aspectLabel').textContent = labels[nextIndex];
    showToast(`📐 ${labels[nextIndex]}`);
}

function cycleSpeed() {
    const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
    const currentIdx = speeds.indexOf(App.playbackSpeed);
    const nextIdx = (currentIdx + 1) % speeds.length;
    App.playbackSpeed = speeds[nextIdx];
    document.getElementById('videoPlayer').playbackRate = App.playbackSpeed;
    document.getElementById('speedLabel').textContent = App.playbackSpeed + 'x';
    showToast(`⏩ ${App.playbackSpeed}x`);
}

function toggleNightMode() {
    App.nightMode = !App.nightMode;
    const video = document.getElementById('videoPlayer');
    if (App.nightMode) {
        video.style.filter = 'brightness(0.7) saturate(0.8)';
        document.querySelector('.main-content').style.backgroundColor = 'rgba(0,0,0,0.9)';
        showToast('🌙 Notte');
    } else {
        video.style.filter = 'none';
        document.querySelector('.main-content').style.backgroundColor = '';
        showToast('☀️ Giorno');
    }
}

function toggleEPG() {
    App.epgOpen = !App.epgOpen;
    document.getElementById('epgPanel').classList.toggle('open', App.epgOpen);
    if (App.epgOpen) generateEPG();
}

function generateEPG() {
    const container = document.getElementById('epgList');
    const now = new Date();

// ⭐ GESTIONE ROTAZIONE SCHERMO - VIDEO A SCHERMO PIENO
function handleOrientationChange() {
    const isLandscape = window.matchMedia("(orientation: landscape)").matches;
    const isMobile = window.innerWidth <= 1024;
    const video = document.getElementById('videoPlayer');
    const hasVideo = video && (video.src || App.hls || App.currentRadio);
    
    if (isLandscape && isMobile && hasVideo) {
        // Entra in landscape mode
        document.body.classList.add('landscape-mode');
        App.isLandscape = true;
        
        // Chiudi tutti i popup aperti
        closeDropdown();
        closePlaylistPopup();
        if (App.epgOpen) toggleEPG();
        closeRecordingsPanel();
        
        // Tentativo fullscreen nativo (Android/Chrome)
        try {
            if (video.requestFullscreen) {
                video.requestFullscreen().catch(() => {});
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.webkitEnterFullscreen) {
                // iOS Safari - metodo specifico
                video.webkitEnterFullscreen();
            }
        } catch(e) {
            console.log('Fullscreen nativo non disponibile, uso CSS fullscreen');
        }
        
        showToast('📱 Schermo intero - ruota per uscire');
        
    } else if (!isLandscape || !isMobile) {
        // Esce da landscape mode
        exitLandscapeMode();
    }
}

function exitLandscapeMode() {
    document.body.classList.remove('landscape-mode');
    App.isLandscape = false;
    
    // Esci dal fullscreen nativo se attivo
    try {
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
        } else if (document.webkitFullscreenElement) {
            document.webkitExitFullscreen();
        }
    } catch(e) {}
}

function takeScreenshot() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls) { showToast('❌ Avvia un canale', true); return; }
    try {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/png');
        document.getElementById('videoFlash').classList.add('flash');
        setTimeout(() => document.getElementById('videoFlash').classList.remove('flash'), 200);
        const preview = document.createElement('img');
        preview.src = dataUrl;
        preview.className = 'screenshot-preview';
        preview.onclick = () => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `SANDRO_RADIO_TV_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            preview.remove();
            showToast('✅ Screenshot scaricato');
        };
        setTimeout(() => { if (preview.parentNode) preview.remove(); }, 5000);
        document.body.appendChild(preview);
        showToast('📸 Screenshot');
        if (navigator.vibrate) navigator.vibrate(30);
    } catch (e) { showToast('❌ Errore screenshot', true); }
}

function toggleRecording() {
    if (App.isRecording) stopRecording();
    else startRecording();
}

function startRecording() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls) { showToast('❌ Avvia un canale', true); return; }
    try {
        const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
        if (!stream) { showToast('❌ Registrazione non supportata', true); return; }
        App.recordedChunks = [];
        let mimeType = 'video/webm;codecs=vp9,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
        App.mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 5000000 });
        App.mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) App.recordedChunks.push(e.data); };
        App.mediaRecorder.onstop = saveRecording;
        App.mediaRecorder.start(1000);
        App.isRecording = true;
        App.recordingStartTime = Date.now();
        document.getElementById('recBadge').classList.add('active');
        document.getElementById('btnRecord').classList.add('recording');
        App.recordingInterval = setInterval(updateRecTimer, 1000);
        showToast('🔴 Registrazione');
    } catch (e) { showToast('❌ Errore registrazione', true); }
}

function stopRecording() {
    if (App.mediaRecorder && App.mediaRecorder.state !== 'inactive') {
        App.mediaRecorder.stop();
        App.isRecording = false;
        clearInterval(App.recordingInterval);
        document.getElementById('recBadge').classList.remove('active');
        document.getElementById('btnRecord').classList.remove('recording');
        showToast('⏹️ Stop');
    }
}

function saveRecording() {
    if (App.recordedChunks.length === 0) return;
    const blob = new Blob(App.recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const rec = {
        id: Date.now(),
        channel: App.currentChannel ? App.currentChannel.name : (App.currentRadio ? App.currentRadio.name : 'Unknown'),
        date: new Date().toLocaleString('it-IT'),
        url: url,
        size: (blob.size / (1024 * 1024)).toFixed(2) + ' MB',
        duration: document.getElementById('recTime').textContent
    };
    App.recordings.unshift(rec);
    if (App.recordings.length > 30) { const old = App.recordings.pop(); if (old.url) URL.revokeObjectURL(old.url); }
    App.recordedChunks = [];
    saveToStorage();
    renderRecordings();
    showToast('✅ Registrazione salvata');
}

function updateRecTimer() {
    const elapsed = Math.floor((Date.now() - App.recordingStartTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('recTime').textContent = `${m}:${s}`;
}

function parseM3U(data) {
    if (!data || typeof data !== 'string') return [];
    const channels = [];
    const lines = data.split('\n');
    let currentChannel = null;
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            const nameMatch = line.match(/,([^,]+)$/);
            const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
            const groupMatch = line.match(/group-title="([^"]+)"/i);
            currentChannel = {
                name: nameMatch ? nameMatch[1].trim() : 'Canale',
                logo: logoMatch ? logoMatch[1] : '',
                group: groupMatch ? groupMatch[1] : 'Altro',
                url: ''
            };
        } else if (line.startsWith('http') && currentChannel) {
            currentChannel.url = line;
            channels.push({ ...currentChannel });
            currentChannel = null;
        }
    }
    return channels.filter(ch => ch.url && ch.name);
}

function loadPlaylistFromFile(input) {
    const file = input.files[0];
    if (!file) return;
    showToast('⏳ Caricamento...');
    const reader = new FileReader();
    reader.onload = e => {
        const channels = parseM3U(e.target.result);
        if (channels.length > 0) {
            App.channels = channels;
            App.currentFilter = 'all';
            filterChannels();
            document.getElementById('channelCount').textContent = App.channels.length;
            showToast(`✅ ${channels.length} canali`);
        } else {
            showToast('❌ Nessun canale trovato', true);
        }
    };
    reader.onerror = () => showToast('❌ Errore lettura', true);
    reader.readAsText(file);
    input.value = '';
}

    fetch(url, { mode: 'cors' })
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(data => {
            const channels = parseM3U(data);
            if (channels.length > 0) {
                App.channels = channels;
                App.currentFilter = 'all';
                filterChannels();
                document.getElementById('channelCount').textContent = App.channels.length;
                document.getElementById('m3uInput').value = '';
                showToast(`✅ ${channels.length} canali`);
            } else {
                showToast('❌ Nessun canale trovato', true);
            }
        })
        .catch(e => { showToast('❌ Errore caricamento', true); });
}

function exportCurrentPlaylistToM3U() {
    if (!App.channels || App.channels.length === 0) {
        showToast('❌ Nessun canale da esportare', true);
        return;
    }
    let m3uContent = '#EXTM3U\n';
    App.channels.forEach(ch => {
        const logoAttr = ch.logo ? ` tvg-logo="${ch.logo}"` : '';
        const groupAttr = ch.group ? ` group-title="${ch.group}"` : '';
        m3uContent += `#EXTINF:-1${logoAttr}${groupAttr},${ch.name}\n${ch.url}\n`;
    });
    const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `SANDRO_PLAYLIST_${new Date().toISOString().slice(0,10)}.m3u`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📤 Playlist esportata con successo!');
}

        if (channels.length > 0) {
            const playlistName = file.name.replace(/\.(m3u|m3u8|txt)$/i, '');
            App.savedPlaylists.push({
                name: playlistName,
                date: new Date().toISOString(),
                channels: channels
            });

            showToast(`✅ "${playlistName}" importata e salvata!`);

    reader.readAsText(file);
    input.value = ''; 
}

        });
    }

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === ' ') { e.preventDefault(); togglePlayPause(); }
        if (e.key === 'ArrowLeft') previousChannel();
        if (e.key === 'ArrowRight') nextChannel();
        if (e.key === 'm' || e.key === 'M') toggleAudio();
        if (e.key === 's' || e.key === 'S') takeScreenshot();
        if (e.key === 'r' || e.key === 'R') toggleRecording();
        if (e.key === 'f' || e.key === 'F') cycleAspectMode();
        if (e.key === 'Escape') { 
            closeDropdown(); 
            closePlaylistPopup();
            if (App.epgOpen) toggleEPG();
            if (App.isLandscape) exitLandscapeMode();
            document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active')); 
        }
    });

    // ⭐ LISTENER ROTAZIONE SCHERMO (multipli per massima compatibilità)
    window.addEventListener('orientationchange', () => {
        setTimeout(handleOrientationChange, 200);
    });
    window.addEventListener('resize', () => {
        clearTimeout(window.resizeTimeout);
        window.resizeTimeout = setTimeout(handleOrientationChange, 150);
    });
    
    // Screen Orientation API (moderna)
    if (screen.orientation) {
        screen.orientation.addEventListener('change', () => {
            setTimeout(handleOrientationChange, 200);
        });
    }
    
    // Controllo iniziale
    setTimeout(handleOrientationChange, 500);

    console.log('✅ App premium inizializzata');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
